name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          yes | $HOME/android-sdk/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses
          $HOME/android-sdk/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-34" "build-tools;34.0.0"
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/my/newproject
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          cp MainActivity.java app/src/main/java/com/my/newproject/
          cp AdminReceiver.java app/src/main/java/com/my/newproject/
          cp LockService.java app/src/main/java/com/my/newproject/
          cp activity_main.xml app/src/main/res/layout/
          cp AndroidManifest.xml app/src/main/
          cp device_admin_receiver.xml app/src/main/res/xml/
          cp accessibility_config.xml app/src/main/res/xml/
      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/bin:$ANDROID_HOME/build-tools/34.0.0:$PATH
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle.zip
          export PATH=$PWD/gradle-8.2/bin:$PATH
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/debug/app-debug.apk
